# GitHub Actions CI/CD Pipeline — Phase 7D
# Runs on: push to main, PR to main
# Pipeline: Lint → Test → Build → Deploy

name: CI/CD Pipeline

on:
  push:
    branches: [ main, echo/* ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/

jobs:
  # === LINT & CODE QUALITY ===
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - house-api-service
          - search-service
          - ai-insights-service
          - portfolio-service
          - scraper-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint black flake8 isort

      - name: Run black (formatter check)
        run: black --check services/${{ matrix.service }}

      - name: Run isort (import check)
        run: isort --check-only services/${{ matrix.service }}

      - name: Run flake8
        run: flake8 services/${{ matrix.service }} --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run pylint
        continue-on-error: true
        run: pylint services/${{ matrix.service }}/app --exit-zero --max-line-length=120

  # === UNIT & INTEGRATION TESTS ===
  test:
    name: Test Services
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - house-api-service
          - search-service
          - portfolio-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Start Docker services (postgres, redis, elasticsearch)
        run: |
          docker-compose up -d postgres redis elasticsearch
          docker-compose exec -T postgres pg_isready -U root
          sleep 10

      - name: Install service dependencies
        run: |
          pip install --upgrade pip
          pip install -r services/${{ matrix.service }}/requirements.txt

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://root:root@localhost:5432/house_discovery
          REDIS_URL: redis://localhost:6379/0
          ELASTICSEARCH_URL: http://localhost:9200
        run: |
          cd services/${{ matrix.service }}
          pytest -v --cov=app --cov-report=xml --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./services/${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}
          fail_ci_if_error: false

      - name: Stop Docker services
        if: always()
        run: docker-compose down

  # === DOCKER BUILD ===
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - house-api-service
          - search-service
          - ai-insights-service
          - portfolio-service
          - scraper-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # === SECURITY SCANNING ===
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # === DEPLOY TO STAGING (optional) ===
  # Uncomment when staging environment is available
  # deploy-staging:
  #   name: Deploy to Staging
  #   runs-on: ubuntu-latest
  #   needs: [ build, security ]
  #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
  #   environment:
  #     name: staging
  #     url: https://staging.neighboriq.com
  #   steps:
  #     - uses: actions/checkout@v4
  #
  #     - name: Deploy via SSH
  #       uses: appleboy/ssh-action@master
  #       with:
  #         host: ${{ secrets.STAGING_HOST }}
  #         username: ${{ secrets.STAGING_USER }}
  #         key: ${{ secrets.STAGING_SSH_KEY }}
  #         script: |
  #           cd /app
  #           git pull origin main
  #           docker-compose -f docker-compose.yml -f docker-compose.prod.yml pull
  #           docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
  #           docker-compose exec -T api-gateway python -m pytest
  #           echo "Staging deployment successful"

  # === NOTIFY SUCCESS ===
  notify:
    name: Notify Completion
    runs-on: ubuntu-latest
    needs: [ lint, test, build ]
    if: always()
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.lint.result }}" = "success" ] && \
             [ "${{ needs.test.result }}" = "success" ] && \
             [ "${{ needs.build.result }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "color=32" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "color=31" >> $GITHUB_OUTPUT
          fi

      - name: Notify via commit status
        run: echo "Pipeline status: ${{ steps.status.outputs.status }}"
